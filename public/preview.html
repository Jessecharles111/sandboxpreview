<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Snapshot Preview</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body, html { width: 100%; height: 100%; overflow: hidden; font-family: system-ui, monospace; }
    #toolbar {
      background: #1e1e2f;
      color: white;
      padding: 8px 16px;
      font-size: 13px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #333;
    }
    #run-btn {
      background: #0a5;
      border: none;
      color: white;
      padding: 4px 12px;
      border-radius: 4px;
      cursor: pointer;
    }
    #run-btn:hover { background: #0a7; }
    #container { height: calc(100% - 45px); position: relative; }
    iframe {
      width: 100%;
      height: 100%;
      border: none;
      background: white;
    }
    #error {
      position: fixed;
      bottom: 20px;
      left: 20px;
      right: 20px;
      background: #ff4444cc;
      backdrop-filter: blur(8px);
      color: white;
      padding: 12px;
      border-radius: 8px;
      font-family: monospace;
      font-size: 13px;
      z-index: 1000;
      display: none;
      max-height: 200px;
      overflow: auto;
      border-left: 4px solid #ff0000;
    }
    .loading-overlay {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: #0f1117;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 16px;
      z-index: 100;
    }
    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(99,102,241,0.3);
      border-top-color: #6366f1;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text { color: #8b9bb0; font-size: 14px; }
  </style>
  <!-- Try multiple CDNs for esbuild-wasm -->
  <script>
    // Array of CDN URLs to try
    const esbuildCDNs = [
      'https://cdn.jsdelivr.net/npm/esbuild-wasm@0.20.2/esbuild.wasm.js',
      'https://unpkg.com/esbuild-wasm@0.20.2/esbuild.wasm.js',
      'https://cdn.skypack.dev/esbuild-wasm@0.20.2/esbuild.wasm.js'
    ];
    let currentCDNIndex = 0;

    function loadEsbuild() {
      if (currentCDNIndex >= esbuildCDNs.length) {
        document.getElementById('error').textContent = '❌ Failed to load esbuild from all CDNs. Please check your internet connection.';
        document.getElementById('error').style.display = 'block';
        document.getElementById('loading-overlay').style.display = 'none';
        return;
      }
      const script = document.createElement('script');
      script.src = esbuildCDNs[currentCDNIndex];
      script.onload = () => {
        console.log('esbuild loaded from', esbuildCDNs[currentCDNIndex]);
        // Initialize after load
        if (window.esbuild) {
          window.esbuildInitialized = true;
          // The main bundleAndRun will be called after this
        }
      };
      script.onerror = () => {
        console.warn('Failed to load from', esbuildCDNs[currentCDNIndex]);
        currentCDNIndex++;
        loadEsbuild();
      };
      document.head.appendChild(script);
    }
    loadEsbuild();
  </script>
</head>
<body>
<div id="toolbar">
  <span>⚡ Snapshot Preview (esbuild + iframe)</span>
  <button id="run-btn">▶ Run</button>
</div>
<div id="container">
  <iframe id="preview-frame" title="preview" sandbox="allow-same-origin allow-scripts allow-popups allow-forms allow-modals"></iframe>
  <div id="loading-overlay" class="loading-overlay">
    <div class="spinner"></div>
    <div class="loading-text">⏳ Preparing preview...</div>
  </div>
</div>
<div id="error"></div>

<script>
  const urlParams = new URLSearchParams(window.location.search);
  const filesJson = urlParams.get('files');
  if (!filesJson) {
    document.getElementById('error').textContent = 'No files provided.';
    document.getElementById('error').style.display = 'block';
    document.getElementById('loading-overlay').style.display = 'none';
    throw new Error('No files');
  }
  const files = JSON.parse(decodeURIComponent(filesJson));
  const fileMap = new Map(Object.entries(files));
  const iframe = document.getElementById('preview-frame');
  const errorDiv = document.getElementById('error');
  const loadingOverlay = document.getElementById('loading-overlay');

  function hideLoading() { loadingOverlay.style.display = 'none'; }

  function rewriteImports(code) {
    return code.replace(/import\s+.*?from\s+['"]([^'"]+)['"]/g, (match, specifier) => {
      if (specifier.startsWith('.') || specifier.startsWith('/')) return match;
      return match.replace(specifier, 'https://esm.sh/' + specifier);
    }).replace(/import\(['"]([^'"]+)['"]\)/g, (match, specifier) => {
      if (specifier.startsWith('.') || specifier.startsWith('/')) return match;
      return match.replace(specifier, 'https://esm.sh/' + specifier);
    });
  }

  async function bundleAndRun() {
    errorDiv.style.display = 'none';
    loadingOverlay.style.display = 'flex';
    iframe.srcdoc = '';

    // Wait for esbuild to be loaded (max 10 seconds)
    let attempts = 0;
    while (!window.esbuild && attempts < 20) {
      await new Promise(r => setTimeout(r, 500));
      attempts++;
    }
    if (!window.esbuild) {
      errorDiv.textContent = '❌ esbuild failed to load. Please refresh the page or check your internet.';
      errorDiv.style.display = 'block';
      hideLoading();
      return;
    }

    try {
      await window.esbuild.initialize({
        wasmURL: 'https://cdn.jsdelivr.net/npm/esbuild-wasm@0.20.2/esbuild.wasm',
      });
    } catch (err) {
      errorDiv.textContent = '❌ esbuild init error: ' + err.message;
      errorDiv.style.display = 'block';
      hideLoading();
      return;
    }

    let entryFile = '/index.js';
    if (fileMap.has('/src/index.js')) entryFile = '/src/index.js';
    if (fileMap.has('/src/index.tsx')) entryFile = '/src/index.tsx';
    if (fileMap.has('/index.html')) {
      const htmlContent = fileMap.get('/index.html');
      iframe.srcdoc = htmlContent;
      hideLoading();
      return;
    }

    const rewritten = new Map();
    for (const [path, content] of fileMap.entries()) {
      if (path.endsWith('.js') || path.endsWith('.jsx') || path.endsWith('.ts') || path.endsWith('.tsx')) {
        rewritten.set(path, rewriteImports(content));
      } else {
        rewritten.set(path, content);
      }
    }

    const fsPlugin = {
      name: 'fs',
      setup(build) {
        build.onResolve({ filter: /.*/ }, args => {
          if (args.path.startsWith('.') || args.path.startsWith('/')) {
            return { path: args.path, namespace: 'file' };
          }
          return { external: true };
        });
        build.onLoad({ filter: /.*/, namespace: 'file' }, async (args) => {
          const content = rewritten.get(args.path);
          if (content) return { contents: content, loader: 'jsx' };
          return null;
        });
      }
    };

    try {
      const result = await window.esbuild.build({
        entryPoints: [entryFile],
        bundle: true,
        write: false,
        format: 'iife',
        globalName: 'SandboxModule',
        platform: 'browser',
        plugins: [fsPlugin],
        loader: { '.js': 'jsx', '.ts': 'tsx', '.tsx': 'tsx' },
        define: { 'process.env.NODE_ENV': '"development"' },
      });

      const bundledCode = result.outputFiles[0].text;
      const reactCDNs = `
        <script src="https://cdn.jsdelivr.net/npm/react@18.2.0/umd/react.development.js"><\/script>
        <script src="https://cdn.jsdelivr.net/npm/react-dom@18.2.0/umd/react-dom.development.js"><\/script>
        <script src="https://cdn.jsdelivr.net/npm/react-router-dom@6.14.2/umd/react-router-dom.development.js"><\/script>
      `;
      const iframeHtml = `<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Preview</title>${reactCDNs}</head><body><div id="root"></div><script>
        window.onerror = function(msg,url,line,col,error){ parent.postMessage({type:"error",error:msg},"*"); return true; };
        try { ${bundledCode} if (typeof SandboxModule !== "undefined" && SandboxModule.default) { const root = ReactDOM.createRoot(document.getElementById("root")); root.render(React.createElement(SandboxModule.default)); } } catch(err) { parent.postMessage({type:"error",error:err.message},"*"); }
      <\/script></body></html>`;
      iframe.srcdoc = iframeHtml;
      hideLoading();
    } catch (err) {
      errorDiv.textContent = '❌ Build error: ' + err.message;
      errorDiv.style.display = 'block';
      hideLoading();
    }
  }

  window.addEventListener('message', (event) => {
    if (event.data && event.data.type === 'error') {
      errorDiv.textContent = '❌ Runtime Error: ' + event.data.error;
      errorDiv.style.display = 'block';
      setTimeout(() => errorDiv.style.display = 'none', 8000);
    }
  });

  document.getElementById('run-btn').addEventListener('click', bundleAndRun);
  bundleAndRun();
</script>
</body>
</html>
